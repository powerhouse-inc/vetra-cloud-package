
name: Publish

on:
  # Auto-publish on push to release branches (skip bot version-bump commits)
  push:
    branches:
      - dev
      - staging
      - main

  # Manual trigger
  workflow_dispatch:
    inputs:
      channel:
        description: 'Release channel'
        required: true
        type: choice
        options:
          - dev
          - staging
          - latest
        default: 'dev'
      dry-run:
        description: 'Dry run (skip publishing)'
        required: false
        type: boolean
        default: false
      skip-docker:
        description: 'Skip Docker build and push'
        required: false
        type: boolean
        default: false

env:
  NODE_VERSION: '24'
  PNPM_VERSION: '10'
  DOCKER_REGISTRY: cr.vetra.io
  GHCR_REGISTRY: ghcr.io

jobs:
  # ==========================================================================
  # Determine release parameters
  # ==========================================================================
  prepare:
    name: Prepare Release
    runs-on: ubuntu-latest
    # Skip commits made by the bot (version bump) to prevent infinite loops
    if: "!contains(github.event.head_commit.message, '[skip ci]') && github.actor != 'github-actions[bot]'"
    outputs:
      channel: ${{ steps.params.outputs.channel }}
      branch: ${{ steps.params.outputs.branch }}
      project_name: ${{ steps.params.outputs.project_name }}
      dry_run: ${{ steps.params.outputs.dry_run }}
      skip_docker: ${{ steps.params.outputs.skip_docker }}
    steps:
      - name: Determine parameters
        id: params
        run: |
          EVENT_NAME="${{ github.event_name }}"

          if [ "$EVENT_NAME" = "push" ]; then
            BRANCH_NAME="${GITHUB_REF#refs/heads/}"
            case "$BRANCH_NAME" in
              dev) CHANNEL="dev" ;;
              staging) CHANNEL="staging" ;;
              main) CHANNEL="latest" ;;
              *) CHANNEL="dev" ;;
            esac
            DRY_RUN="false"
            SKIP_DOCKER="true"
          else
            CHANNEL="${{ inputs.channel }}"
            DRY_RUN="${{ inputs.dry-run }}"
            SKIP_DOCKER="${{ inputs.skip-docker }}"
          fi

          # Determine branch from channel
          case "$CHANNEL" in
            dev) BRANCH="dev" ;;
            staging) BRANCH="staging" ;;
            latest|main) BRANCH="main" ;;
            *) BRANCH="dev" ;;
          esac

          # Use DOCKER_PROJECT secret if set, otherwise extract from repository name
          if [ -n "${{ secrets.DOCKER_PROJECT }}" ]; then
            PROJECT_NAME="${{ secrets.DOCKER_PROJECT }}"
          else
            PROJECT_NAME="${GITHUB_REPOSITORY#*/}"
          fi

          echo "channel=$CHANNEL" >> $GITHUB_OUTPUT
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT
          echo "project_name=$PROJECT_NAME" >> $GITHUB_OUTPUT
          echo "dry_run=$DRY_RUN" >> $GITHUB_OUTPUT
          echo "skip_docker=$SKIP_DOCKER" >> $GITHUB_OUTPUT

          echo "Channel: $CHANNEL | Branch: $BRANCH | Dry Run: $DRY_RUN | Skip Docker: $SKIP_DOCKER"

  # ==========================================================================
  # Build and publish to npm
  # ==========================================================================
  publish:
    name: Publish NPM
    needs: prepare
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    outputs:
      new_version: ${{ steps.version.outputs.new_version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.branch }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install dependencies
        run: pnpm install

      - name: Build package
        run: pnpm exec ph-cli build

      - name: Run tests
        run: pnpm test || true
        continue-on-error: true

      - name: Bump version
        id: version
        run: |
          CHANNEL="${{ needs.prepare.outputs.channel }}"
          CURRENT_VERSION=$(node -p "require('./package.json').version")

          if [ "$CHANNEL" = "latest" ]; then
            npm version patch --no-git-tag-version
          else
            npm version prerelease --preid=$CHANNEL --no-git-tag-version
          fi

          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "Bumped: $CURRENT_VERSION -> $NEW_VERSION"

      - name: Commit and push version bump
        if: needs.prepare.outputs.dry_run != 'true'
        run: |
          git add package.json pnpm-lock.yaml
          git commit -m "chore: bump version to ${{ steps.version.outputs.new_version }} [skip ci]" || echo "No changes to commit"
          git push

      - name: Setup npm for publishing
        if: needs.prepare.outputs.dry_run != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: 'https://registry.dev.vetra.io'

      - name: Publish to Vetra registry
        if: needs.prepare.outputs.dry_run != 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.VETRA_REGISTRY_TOKEN }}
        run: |
          # ph-cli publish is a thin wrapper over `npm publish` that resolves the
          # registry URL and verifies auth via `npm whoami` before forwarding the
          # remaining flags. --no-git-checks is pnpm-only and intentionally omitted.
          CHANNEL="${{ needs.prepare.outputs.channel }}"
          pnpm exec ph-cli publish \
            --registry https://registry.dev.vetra.io \
            --access public \
            --tag "$CHANNEL"

      - name: Create git tag
        if: needs.prepare.outputs.dry_run != 'true'
        run: |
          git tag "v${{ steps.version.outputs.new_version }}"
          git push origin "v${{ steps.version.outputs.new_version }}"

  # ==========================================================================
  # NOTE: Docker image build intentionally removed.
  # vetra-cloud-package is published as an npm package only; the
  # connect/switchboard/secrets-controller images are built elsewhere.
  # (The skip-docker input and *_REGISTRY env vars above are now unused.)
  # ==========================================================================
