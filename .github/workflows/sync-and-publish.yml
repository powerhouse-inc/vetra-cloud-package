name: Sync and Publish

on:
  # Triggered by powerhouse monorepo or downstream packages after release
  repository_dispatch:
    types: [powerhouse-release, dependency-release]

  # Manual trigger
  workflow_dispatch:
    inputs:
      channel:
        description: "Release channel"
        required: true
        type: choice
        options:
          - dev
          - staging
          - latest
        default: "staging"
      version:
        description: "Powerhouse version (e.g., 6.0.1-staging.1)"
        required: false
        type: string
      dry-run:
        description: "Dry run (skip publishing)"
        required: false
        type: boolean
        default: false
      skip-docker:
        description: "Skip Docker build and push"
        required: false
        type: boolean
        default: false

concurrency:
  group: sync-and-publish
  cancel-in-progress: false

env:
  NODE_VERSION: "24"
  PNPM_VERSION: "10"
  DOCKER_REGISTRY: cr.vetra.io
  GHCR_REGISTRY: ghcr.io

jobs:
  # ==========================================================================
  # Determine release parameters
  # ==========================================================================
  prepare:
    name: Prepare Release
    runs-on: ubuntu-latest
    outputs:
      channel: ${{ steps.params.outputs.channel }}
      version: ${{ steps.params.outputs.version }}
      branch: ${{ steps.params.outputs.branch }}
      project_name: ${{ steps.params.outputs.project_name }}
      dry_run: ${{ steps.params.outputs.dry_run }}
      skip_docker: ${{ steps.params.outputs.skip_docker }}
      dep_package: ${{ steps.params.outputs.dep_package }}
      dep_version: ${{ steps.params.outputs.dep_version }}
    steps:
      - name: Determine parameters
        id: params
        env:
          EVENT_NAME: ${{ github.event_name }}
          EVENT_ACTION: ${{ github.event.action }}
          PAYLOAD_CHANNEL: ${{ github.event.client_payload.channel }}
          PAYLOAD_VERSION: ${{ github.event.client_payload.version }}
          PAYLOAD_PH_VERSION: ${{ github.event.client_payload.powerhouse_version }}
          PAYLOAD_PACKAGE: ${{ github.event.client_payload.package }}
          INPUT_CHANNEL: ${{ inputs.channel }}
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_DRY_RUN: ${{ inputs.dry-run }}
          INPUT_SKIP_DOCKER: ${{ inputs.skip-docker }}
        run: |
          if [ "$EVENT_NAME" = "repository_dispatch" ]; then
            CHANNEL="$PAYLOAD_CHANNEL"
            DRY_RUN="false"
            SKIP_DOCKER="false"

            if [ "$EVENT_ACTION" = "dependency-release" ]; then
              DEP_PACKAGE="$PAYLOAD_PACKAGE"
              DEP_VERSION="$PAYLOAD_VERSION"
              VERSION="$PAYLOAD_PH_VERSION"
            else
              DEP_PACKAGE=""
              DEP_VERSION=""
              VERSION="$PAYLOAD_VERSION"
            fi
          else
            CHANNEL="$INPUT_CHANNEL"
            VERSION="$INPUT_VERSION"
            DRY_RUN="$INPUT_DRY_RUN"
            SKIP_DOCKER="$INPUT_SKIP_DOCKER"
            DEP_PACKAGE=""
            DEP_VERSION=""
          fi

          # Default channel to staging if not set
          CHANNEL="${CHANNEL:-staging}"

          # Determine branch from channel
          case "$CHANNEL" in
            dev) BRANCH="dev" ;;
            staging) BRANCH="staging" ;;
            latest|main) BRANCH="main" ;;
            *) BRANCH="main" ;;
          esac

          PROJECT_NAME="vetra"

          echo "channel=$CHANNEL" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT
          echo "project_name=$PROJECT_NAME" >> $GITHUB_OUTPUT
          echo "dry_run=$DRY_RUN" >> $GITHUB_OUTPUT
          echo "skip_docker=$SKIP_DOCKER" >> $GITHUB_OUTPUT
          echo "dep_package=$DEP_PACKAGE" >> $GITHUB_OUTPUT
          echo "dep_version=$DEP_VERSION" >> $GITHUB_OUTPUT

          echo "Channel: $CHANNEL"
          echo "Version: $VERSION"
          echo "Branch: $BRANCH"
          echo "Project: $PROJECT_NAME"
          echo "Dry Run: $DRY_RUN"
          echo "Skip Docker: $SKIP_DOCKER"
          echo "Dependency Package: $DEP_PACKAGE"
          echo "Dependency Version: $DEP_VERSION"

  # ==========================================================================
  # Update dependencies and publish to npm
  # ==========================================================================
  update-and-publish:
    name: Update & Publish NPM
    needs: prepare
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    outputs:
      new_version: ${{ steps.version.outputs.new_version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.branch }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install dependencies
        run: pnpm install

      - name: Update Powerhouse dependencies
        env:
          CHANNEL: ${{ needs.prepare.outputs.channel }}
        run: |
          # Use the channel as the npm dist-tag (dev, staging, or latest)
          TAG="$CHANNEL"
          if [ "$TAG" = "main" ]; then
            TAG="latest"
          fi

          echo "Updating @powerhousedao/* and document-model/document-drive to @${TAG}"

          PACKAGES=$(node -e "
            const pkg = require('./package.json');
            const deps = {...pkg.dependencies, ...pkg.devDependencies};
            const names = Object.keys(deps).filter(d =>
              (d.startsWith('@powerhousedao/') || ['document-model','document-drive'].includes(d))
            );
            console.log(names.join(' '));
          ")

          for pkg in $PACKAGES; do
            echo "Updating $pkg to @${TAG}"
            pnpm add "${pkg}@${TAG}" || echo "Warning: Failed to update $pkg"
          done

          echo "Powerhouse dependencies updated to @${TAG}"

      - name: Update downstream dependency
        if: needs.prepare.outputs.dep_package != '' && needs.prepare.outputs.dep_version != ''
        env:
          DEP_PKG: ${{ needs.prepare.outputs.dep_package }}
          DEP_VER: ${{ needs.prepare.outputs.dep_version }}
        run: |
          echo "Updating $DEP_PKG to $DEP_VER"
          pnpm add "${DEP_PKG}@${DEP_VER}" || { echo "Failed to update $DEP_PKG"; exit 1; }

      - name: Generate code
        run: pnpm generate

      - name: Build package
        run: pnpm build

      - name: Run tests
        run: pnpm test || true
        continue-on-error: true

      - name: Bump version
        id: version
        env:
          CHANNEL: ${{ needs.prepare.outputs.channel }}
        run: |
          CURRENT_VERSION=$(node -p "require('./package.json').version")

          if [ "$CHANNEL" = "latest" ] || [ "$CHANNEL" = "main" ]; then
            npm version patch --no-git-tag-version
          else
            npm version prerelease --preid=$CHANNEL --no-git-tag-version
          fi

          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "Bumped version: $CURRENT_VERSION -> $NEW_VERSION"

      - name: Commit changes
        env:
          NEW_VERSION: ${{ steps.version.outputs.new_version }}
          PH_VERSION: ${{ needs.prepare.outputs.version }}
          DEP_PKG: ${{ needs.prepare.outputs.dep_package }}
          DEP_VER: ${{ needs.prepare.outputs.dep_version }}
        run: |
          git add package.json pnpm-lock.yaml
          git add -A document-models/*/gen/ editors/*/gen/ || true

          MSG="chore: bump version to ${NEW_VERSION}"
          DETAILS=""
          if [ -n "$PH_VERSION" ]; then
            DETAILS="powerhouse ${PH_VERSION}"
          fi
          if [ -n "$DEP_PKG" ]; then
            DEP="${DEP_PKG}@${DEP_VER}"
            DETAILS="${DETAILS:+$DETAILS, }$DEP"
          fi
          if [ -n "$DETAILS" ]; then
            MSG="$MSG ($DETAILS)"
          fi

          git commit -m "$MSG" || echo "No changes to commit"

      - name: Push changes
        if: needs.prepare.outputs.dry_run != 'true'
        env:
          BRANCH: ${{ needs.prepare.outputs.branch }}
        run: |
          git pull --rebase origin "$BRANCH"
          git push

      - name: Create git tag
        if: needs.prepare.outputs.dry_run != 'true'
        env:
          NEW_VERSION: ${{ steps.version.outputs.new_version }}
        run: |
          git tag "v${NEW_VERSION}"
          git push origin "v${NEW_VERSION}"

      - name: Setup npm for publishing
        if: needs.prepare.outputs.dry_run != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: "https://registry.npmjs.org"

      - name: Publish to npm
        if: needs.prepare.outputs.dry_run != 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_ACCESS_TOKEN }}
          CHANNEL: ${{ needs.prepare.outputs.channel }}
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "NPM_ACCESS_TOKEN not set, skipping npm publish"
            exit 0
          fi
          if [ "$CHANNEL" = "latest" ] || [ "$CHANNEL" = "main" ]; then
            pnpm publish --access public --tag latest --no-git-checks
          else
            pnpm publish --access public --tag "$CHANNEL" --no-git-checks
          fi

  # ==========================================================================
  # Build and push Docker images
  # ==========================================================================
  build-docker:
    name: Build Docker Images
    needs: [prepare, update-and-publish]
    if: |
      needs.prepare.outputs.skip_docker != 'true' &&
      needs.prepare.outputs.dry_run != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        target: [connect, switchboard]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.branch }}

      - name: Pull latest changes
        env:
          BRANCH: ${{ needs.prepare.outputs.branch }}
        run: git pull origin "$BRANCH"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Ensure Docker project exists
        env:
          PROJECT_NAME: ${{ needs.prepare.outputs.project_name }}
          DOCKER_USER: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASS: ${{ secrets.DOCKER_PASSWORD }}
          REGISTRY: ${{ env.DOCKER_REGISTRY }}
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -u "${DOCKER_USER}:${DOCKER_PASS}" \
            "https://${REGISTRY}/api/v2.0/projects?name=${PROJECT_NAME}")

          if [ "$STATUS" = "200" ]; then
            EXISTS=$(curl -s \
              -u "${DOCKER_USER}:${DOCKER_PASS}" \
              "https://${REGISTRY}/api/v2.0/projects?name=${PROJECT_NAME}" | \
              jq -r ".[] | select(.name==\"${PROJECT_NAME}\") | .name")

            if [ "$EXISTS" = "$PROJECT_NAME" ]; then
              echo "Project ${PROJECT_NAME} already exists"
            else
              echo "Creating project ${PROJECT_NAME}..."
              curl -X POST \
                -u "${DOCKER_USER}:${DOCKER_PASS}" \
                -H "Content-Type: application/json" \
                -d "{\"project_name\": \"${PROJECT_NAME}\", \"public\": false}" \
                "https://${REGISTRY}/api/v2.0/projects"
            fi
          else
            echo "Creating project ${PROJECT_NAME}..."
            curl -X POST \
              -u "${DOCKER_USER}:${DOCKER_PASS}" \
              -H "Content-Type: application/json" \
              -d "{\"project_name\": \"${PROJECT_NAME}\", \"public\": false}" \
              "https://${REGISTRY}/api/v2.0/projects"
          fi

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract package name
        id: package
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          echo "name=$PACKAGE_NAME" >> $GITHUB_OUTPUT

      - name: Determine image tags
        id: tags
        env:
          VERSION: ${{ needs.update-and-publish.outputs.new_version }}
          CHANNEL: ${{ needs.prepare.outputs.channel }}
          PROJECT: ${{ needs.prepare.outputs.project_name }}
          TARGET: ${{ matrix.target }}
          GHCR_REG: ${{ env.GHCR_REGISTRY }}
          DOCKER_REG: ${{ env.DOCKER_REGISTRY }}
          REPO_OWNER: ${{ github.repository_owner }}
        run: |
          GHCR_BASE="${GHCR_REG}/${REPO_OWNER}/${PROJECT}/${TARGET}"
          DOCKER_BASE="${DOCKER_REG}/${PROJECT}/${TARGET}"

          TAGS="${GHCR_BASE}:v${VERSION}"
          TAGS="${TAGS},${DOCKER_BASE}:v${VERSION}"

          if [ "$CHANNEL" = "latest" ] || [ "$CHANNEL" = "main" ]; then
            TAGS="${TAGS},${GHCR_BASE}:latest"
            TAGS="${TAGS},${DOCKER_BASE}:latest"
          else
            TAGS="${TAGS},${GHCR_BASE}:${CHANNEL}"
            TAGS="${TAGS},${DOCKER_BASE}:${CHANNEL}"
          fi

          echo "tags=$TAGS" >> $GITHUB_OUTPUT
          echo "Image tags: $TAGS"

      - name: Build and push ${{ matrix.target }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          target: ${{ matrix.target }}
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          build-args: |
            TAG=${{ needs.prepare.outputs.channel == 'latest' && 'latest' || needs.prepare.outputs.version }}
            PACKAGE_NAME=${{ steps.package.outputs.name }}
            PH_CONNECT_BASE_PATH=/
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ==========================================================================
  # Update k8s-hosting repo with new image tags (GitOps)
  # ==========================================================================
  update-k8s:
    name: Update K8s Hosting
    needs: [prepare, update-and-publish, build-docker]
    if: needs.prepare.outputs.dry_run != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout k8s-hosting repository
        uses: actions/checkout@v4
        with:
          repository: powerhouse-inc/powerhouse-k8s-hosting
          token: ${{ secrets.K8S_REPO_PAT }}
          path: k8s-hosting

      - name: Install yq
        uses: mikefarah/yq@v4

      - name: Update image tags
        env:
          VERSION: "v${{ needs.update-and-publish.outputs.new_version }}"
        run: |
          VALUES_FILE="k8s-hosting/tenants/vetra/powerhouse-values.yaml"

          echo "Updating ${VALUES_FILE} with version ${VERSION}"

          yq -i ".switchboard.image.tag = \"${VERSION}\"" "$VALUES_FILE"
          yq -i ".connect.image.tag = \"${VERSION}\"" "$VALUES_FILE"

          echo "Updated image tags to ${VERSION}"
          cat "$VALUES_FILE" | grep -A2 "image:" | head -20

      - name: Commit and push changes
        env:
          VERSION: "v${{ needs.update-and-publish.outputs.new_version }}"
        run: |
          cd k8s-hosting
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add "tenants/vetra/powerhouse-values.yaml"

          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore(vetra): update image tags to ${VERSION}"
            git push
          fi

  # ==========================================================================
  # Summary
  # ==========================================================================
  summary:
    name: Release Summary
    needs: [prepare, update-and-publish, build-docker, update-k8s]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Summary
        env:
          CHANNEL: ${{ needs.prepare.outputs.channel }}
          BRANCH: ${{ needs.prepare.outputs.branch }}
          PH_VERSION: ${{ needs.prepare.outputs.version }}
          PKG_VERSION: ${{ needs.update-and-publish.outputs.new_version }}
          DRY_RUN: ${{ needs.prepare.outputs.dry_run }}
          PROJECT: ${{ needs.prepare.outputs.project_name }}
          DOCKER_REG: ${{ env.DOCKER_REGISTRY }}
        run: |
          echo "## Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Parameter | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Channel | ${CHANNEL} |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | ${BRANCH} |" >> $GITHUB_STEP_SUMMARY
          echo "| Powerhouse Version | ${PH_VERSION} |" >> $GITHUB_STEP_SUMMARY
          echo "| Package Version | ${PKG_VERSION} |" >> $GITHUB_STEP_SUMMARY
          echo "| Dry Run | ${DRY_RUN} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Docker Images" >> $GITHUB_STEP_SUMMARY
          echo "- \`${DOCKER_REG}/${PROJECT}/connect:v${PKG_VERSION}\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`${DOCKER_REG}/${PROJECT}/switchboard:v${PKG_VERSION}\`" >> $GITHUB_STEP_SUMMARY
