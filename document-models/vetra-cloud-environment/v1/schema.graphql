type VetraCloudEnvironmentState {
  owner: EthereumAddress
  label: String
  genericSubdomain: String
  genericBaseDomain: String
  customDomain: VetraCustomDomain
  defaultPackageRegistry: URL
  services: [VetraCloudEnvironmentService!]!
  packages: [VetraCloudPackage!]!
  status: VetraCloudEnvironmentStatus!
  apexService: VetraCloudEnvironmentServiceType
}

type VetraCustomDomain {
  enabled: Boolean!
  domain: String
  dnsRecords: [DnsRecord!]!
}

type DnsRecord {
  type: String!
  host: String!
  value: String!
}

type VetraCloudEnvironmentService {
  type: VetraCloudEnvironmentServiceType!
  prefix: String!
  enabled: Boolean!
  url: String
  status: ServiceStatus!
  version: String
}

enum VetraCloudEnvironmentServiceType {
  CONNECT
  SWITCHBOARD
  FUSION
}

enum ServiceStatus {
  ACTIVE
  SUSPENDED
  PROVISIONING
  BILLING_ISSUE
}

enum VetraCloudEnvironmentStatus {
  DRAFT
  CHANGES_PENDING
  CHANGES_APPROVED
  CHANGES_PUSHED
  DEPLOYING
  DEPLOYMENt_FAILED
  READY
  TERMINATING
  DESTROYED
  ARCHIVED
  STOPPED
}

type VetraCloudPackage {
  registry: URL!
  name: String!
  version: String
}

# data_management

input SetOwnerInput {
  address: EthereumAddress!
}

input SetLabelInput {
  label: String!
}

input SetGenericSubdomainInput {
  genericSubdomain: String!
}

input SetCustomDomainInput {
  enabled: Boolean!
  domain: String
}

input SetDefaultPackageRegistryInput {
  defaultPackageRegistry: URL!
}

input SetDnsRecordsInput {
  records: [DnsRecordInput!]!
}

input DnsRecordInput {
  type: String!
  host: String!
  value: String!
}

input SetApexServiceInput {
  type: VetraCloudEnvironmentServiceType
}

# services

input EnableServiceInput {
  type: VetraCloudEnvironmentServiceType!
  prefix: String!
}

input DisableServiceInput {
  type: VetraCloudEnvironmentServiceType!
}

input ToggleServiceInput {
  type: VetraCloudEnvironmentServiceType!
}

input UpdateServicePrefixInput {
  type: VetraCloudEnvironmentServiceType!
  prefix: String!
}

input SetServiceStatusInput {
  type: VetraCloudEnvironmentServiceType!
  status: ServiceStatus!
  url: String
}

input SetServiceVersionInput {
  type: VetraCloudEnvironmentServiceType!
  version: String!
}

# packages

input AddPackageInput {
  registry: URL
  packageName: String!
  version: String
}

input RemovePackageInput {
  packageName: String!
}

input SetPackageVersionInput {
  packageName: String!
  version: String!
}

# status_transitions

input InitializeInput {
  genericSubdomain: String!
  genericBaseDomain: String!
  defaultPackageRegistry: URL
}

input MarkChangesPushedInput {
  _placeholder: String
}

input MarkDeploymentStartedInput {
  _placeholder: String
}

input ReportDeploymentSucceededInput {
  _placeholder: String
}

input ReportDeploymentFailedInput {
  code: String!
  message: String!
}

input ApproveChangesInput {
  _placeholder: String
}

input TerminateEnvironmentInput {
  _placeholder: String
}

input MarkDestroyedInput {
  _placeholder: String
}

input ArchiveInput {
  _placeholder: String
}

input UnarchiveInput {
  _placeholder: String
}