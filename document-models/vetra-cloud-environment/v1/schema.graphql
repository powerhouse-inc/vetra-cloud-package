type VetraCloudEnvironmentState {
  owner: EthereumAddress
  label: String
  genericSubdomain: String
  genericBaseDomain: String
  customDomain: VetraCustomDomain
  defaultPackageRegistry: URL
  services: [VetraCloudEnvironmentService!]!
  packages: [VetraCloudPackage!]!
  status: VetraCloudEnvironmentStatus!
  apexService: VetraCloudEnvironmentServiceType
  autoUpdateChannel: AutoUpdateChannel
  runtimeConfig: String
}

enum AutoUpdateChannel {
  DEV
  STAGING
  LATEST
}

type VetraCustomDomain {
  enabled: Boolean!
  domain: String
  dnsRecords: [DnsRecord!]!
}

type DnsRecord {
  type: String!
  host: String!
  value: String!
}

type VetraCloudEnvironmentService {
  type: VetraCloudEnvironmentServiceType!
  prefix: String!
  enabled: Boolean!
  url: String
  status: ServiceStatus!
  version: String
  config: VetraCloudServiceClint
  selectedRessource: VetraCloudRessourceSize
}

type VetraCloudServiceClint {
  package: VetraCloudPackage!
  env: [VetraCloudServiceEnv!]!
  serviceCommand: String
  selectedRessource: VetraCloudRessourceSize
}

type VetraCloudServiceEnv {
  name: String!
  value: String
  isSecret: Boolean
}

enum VetraCloudRessourceSize {
  VETRA_AGENT_S
  VETRA_AGENT_M
  VETRA_AGENT_L
  VETRA_AGENT_XL
  VETRA_AGENT_XXL
}

enum VetraCloudEnvironmentServiceType {
  CONNECT
  SWITCHBOARD
  FUSION
  CLINT
}

enum ServiceStatus {
  ACTIVE
  SUSPENDED
  PROVISIONING
  BILLING_ISSUE
}

enum VetraCloudEnvironmentStatus {
  DRAFT
  CHANGES_PENDING
  CHANGES_APPROVED
  CHANGES_PUSHED
  DEPLOYING
  DEPLOYMENt_FAILED
  READY
  TERMINATING
  DESTROYED
  ARCHIVED
  STOPPED
}

type VetraCloudPackage {
  registry: URL!
  name: String!
  version: String
}

# data_management

input SetOwnerInput {
  address: EthereumAddress!
}

input SetLabelInput {
  label: String!
}

input SetGenericSubdomainInput {
  genericSubdomain: String!
}

input SetCustomDomainInput {
  enabled: Boolean!
  domain: String
}

input SetDefaultPackageRegistryInput {
  defaultPackageRegistry: URL!
}

input SetDnsRecordsInput {
  records: [DnsRecordInput!]!
}

input DnsRecordInput {
  type: String!
  host: String!
  value: String!
}

input SetApexServiceInput {
  type: VetraCloudEnvironmentServiceType
}

input SetAutoUpdateChannelInput {
  channel: AutoUpdateChannel
}

input SetRuntimeConfigInput {
  config: String
}

# services

input EnableServiceInput {
  type: VetraCloudEnvironmentServiceType!
  prefix: String!
  clintConfig: VetraCloudServiceClintInput
  selectedRessource: VetraCloudRessourceSize
}

input VetraCloudServiceClintInput {
  package: VetraCloudPackageInput!
  env: [VetraCloudServiceEnvInput!]!
  serviceCommand: String
  selectedRessource: VetraCloudRessourceSize
}

input VetraCloudPackageInput {
  registry: URL!
  name: String!
  version: String
}

input VetraCloudServiceEnvInput {
  name: String!
  value: String
  isSecret: Boolean
}

input SetServiceConfigInput {
  prefix: String!
  config: VetraCloudServiceClintConfigInput!
}

input VetraCloudServiceClintConfigInput {
  package: VetraCloudPackageConfigInput!
  env: [VetraCloudServiceEnvConfigInput!]!
  serviceCommand: String
  selectedRessource: VetraCloudRessourceSize
}

input VetraCloudPackageConfigInput {
  registry: URL!
  name: String!
  version: String
}

input VetraCloudServiceEnvConfigInput {
  name: String!
  value: String
  isSecret: Boolean
}

input DisableServiceInput {
  type: VetraCloudEnvironmentServiceType!
  prefix: String
}

input ToggleServiceInput {
  type: VetraCloudEnvironmentServiceType!
}

input UpdateServicePrefixInput {
  type: VetraCloudEnvironmentServiceType!
  prefix: String!
}

input SetServiceStatusInput {
  type: VetraCloudEnvironmentServiceType!
  status: ServiceStatus!
  url: String
}

input SetServiceVersionInput {
  type: VetraCloudEnvironmentServiceType!
  version: String!
}

input SetServiceSizeInput {
  prefix: String!
  size: VetraCloudRessourceSize!
}

# packages

input AddPackageInput {
  registry: URL
  packageName: String!
  version: String
}

input RemovePackageInput {
  packageName: String!
}

input SetPackageVersionInput {
  packageName: String!
  version: String!
}

# status_transitions

input InitializeInput {
  genericSubdomain: String!
  genericBaseDomain: String!
  defaultPackageRegistry: URL
}

input MarkChangesPushedInput {
  _placeholder: String
}

input MarkDeploymentStartedInput {
  _placeholder: String
}

input ReportDeploymentSucceededInput {
  _placeholder: String
}

input ReportDeploymentFailedInput {
  code: String!
  message: String!
}

input ApproveChangesInput {
  _placeholder: String
}

input TerminateEnvironmentInput {
  _placeholder: String
}

input MarkDestroyedInput {
  _placeholder: String
}

input ArchiveInput {
  _placeholder: String
}

input UnarchiveInput {
  _placeholder: String
}