enum VetraCloudEnvironmentService {
  CONNECT
  SWITCHBOARD
}

enum VetraCloudEnvironmentStatus {
  STOPPED
  STARTED
}

type VetraCloudPackage {
  name: String!
  version: String
}

type VetraCloudEnvironmentState {
  name: String
  services: [VetraCloudEnvironmentService!]!
  packages: [VetraCloudPackage!]
  status: VetraCloudEnvironmentStatus!
}

# data_management

input SetEnvironmentNameInput {
  "Add your inputs here"
  name: String!
}

# services

input EnableServiceInput {
  "Add your inputs here"
  serviceName: VetraCloudEnvironmentService!
}

input DisableServiceInput {
  "Add your inputs here"
  serviceName: VetraCloudEnvironmentService!
}

# packages

input AddPackageInput {
  "Add your inputs here"
  packageName: String!
  version: String
}

input RemovePackageInput {
  "Add your inputs here"
  packageName: String!
}

# status

input StartInput {
  "Add your inputs here"
  _placeholder: String
}

input StopInput {
  "Add your inputs here"
  _placeholder: String
}